<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocole de Sécurité - Chargement / Déchargement</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 3px solid #FF6600; }
        .logo { height: 75px; max-width: 220px; }
        h1 { color: #003366; margin: 0; line-height: 1.2; }
        .section { margin: 25px 0; padding: 20px; background: #f9f9f9; border-left: 6px solid #FF6600; border-radius: 8px; }
        label { display: block; margin: 12px 0 6px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        canvas { border: 2px solid #003366; border-radius: 8px; background: #fff; width: 100%; max-width: 700px; touch-action: none; }
        button { background: #FF6600; color: white; padding: 14px 30px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #e55a00; }
        iframe { border: 2px solid #FF6600; border-radius: 8px; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo-demathieu-bard.png" alt="Demathieu Bard Logo" class="logo">
            <h1>PROTOCOLE DE SÉCURITÉ<br><small>Chargement / Déchargement</small></h1>
        </div>

        <div class="section">
            <h2>📄 Aperçu du Protocole de Sécurité</h2>
            <iframe src="protocole-securite.pdf" width="100%" height="700px"></iframe>
            <p style="margin-top: 10px;">
                ⚠️ Si le PDF ne s'affiche pas, <a href="protocole-securite.pdf" target="_blank">cliquez ici pour le télécharger</a>
            </p>
        </div>

        <form id="protocolForm">
            <div class="checkbox">
                <input type="checkbox" id="atteste" required>
                <label for="atteste">J'atteste avoir lu et compris le document ci-dessus <span style="color:red;">*</span></label>
            </div>

            <!-- Transporteur / Fournisseur -->
            <h3 style="color:#003366; margin-top: 30px;">TRANSPORTEUR / FOURNISSEUR</h3>
            
            <label>Raison Sociale : <span style="color:red;">*</span></label>
            <input type="text" id="raison_sociale" required placeholder="Ex: KONE SAS, SCHINDLER...">

            <label>Adresse :</label>
            <input type="text" id="adresse" placeholder="Adresse complète">

            <label>Nom du contact sur chantier :</label>
            <input type="text" id="nom_contact" placeholder="Nom du responsable">

            <label>Tél contact sur chantier :</label>
            <input type="tel" id="tel_contact" placeholder="06 XX XX XX XX">

            <hr style="margin: 30px 0; border: 1px solid #ddd;">

            <!-- Société de livraison -->
            <label>Société de livraison (si différente du transporteur) : <span style="color:red;">*</span></label>
            <input type="text" id="societe" required placeholder="Ex: KONE, SCHINDLER, AXIMA...">

            <label>Entreprise livrée : <span style="color:red;">*</span></label>
            <input type="text" id="entreprise" required placeholder="Ex: Demathieu Bard Construction">

            <label>Type d'opération : <span style="color:red;">*</span></label>
            <select id="type_operation" required onchange="toggleAutre()">
                <option value="">-- Sélectionnez --</option>
                <option value="Chargement">Chargement</option>
                <option value="Déchargement">Déchargement</option>
                <option value="Chargement et Déchargement">Chargement et Déchargement</option>
                <option value="Autre">Autre (préciser)</option>
            </select>

            <div id="autre_div" style="display: none;">
                <label>Précisez le type d'opération :</label>
                <input type="text" id="autre_operation">
            </div>

            <label>Matières transportées :</label>
            <textarea id="matieres" rows="3" placeholder="Ex: Acier, béton, éléments préfabriqués, consommables, matériels, matières dangereuses..."></textarea>

            <label>Date de livraison : <span style="color:red;">*</span></label>
            <input type="date" id="date" required>

            <label>Heure de livraison : <span style="color:red;">*</span></label>
            <input type="time" id="heure" required>

            <label>Nom et prénom du chauffeur : <span style="color:red;">*</span></label>
            <input type="text" id="nom" required placeholder="Nom Prénom">

            <label>Signature du chauffeur :</label>
            <canvas id="signature" width="700" height="220"></canvas>
            <br><br>
            <button type="button" onclick="clearSignature()">Effacer la signature</button>

            <br><br>
            <button type="button" onclick="submitForm()">📧 Soumettre et Générer le PDF</button>
        </form>
        </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    const canvas = document.getElementById('signature');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let lastX = 0;
    let lastY = 0;

    function initCanvas() {
        ctx.strokeStyle = '#003366';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 0;
    }

    initCanvas();

    // Souris
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);

    // Tactile (téléphone)
    canvas.addEventListener('touchstart', startDrawingTouch);
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchmove', drawTouch);

    function startDrawing(e) {
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        lastX = e.offsetX || (e.touches ? e.touches[0].clientX - rect.left : 0);
        lastY = e.offsetY || (e.touches ? e.touches[0].clientY - rect.top : 0);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
    }

    function startDrawingTouch(e) {
        e.preventDefault();
        drawing = true;
        const rect = canvas.getBoundingClientRect();
        lastX = e.touches[0].clientX - rect.left;
        lastY = e.touches[0].clientY - rect.top;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
    }

    function draw(e) {
        if (!drawing) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    function drawTouch(e) {
        if (!drawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function stopDrawing() {
        drawing = false;
    }

    // Bouton Effacer (corrigé)
    function clearSignature() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        initCanvas();
        console.log("Signature effacée correctement");
    }

    // Gestion "Autre"
    function toggleAutre() {
        const select = document.getElementById('type_operation');
        document.getElementById('autre_div').style.display = (select.value === "Autre") ? "block" : "none";
    }

    // Soumission
        function submitForm() {
            if (!document.getElementById('atteste').checked) {
                alert("⚠️ Vous devez attester avoir lu et compris le protocole.");
                return;
            }

            const raison = document.getElementById('raison_sociale').value || "Non renseigné";
            const nom = document.getElementById('nom').value || "Inconnu";
            const societe = document.getElementById('societe').value || "Même que transporteur";
            const date = document.getElementById('date').value || "2026-00-00";
            let typeOp = document.getElementById('type_operation').value;
            if (typeOp === "Autre") {
                typeOp = document.getElementById('autre_operation').value || "Autre";
            }
            const matieres = document.getElementById('matieres').value || "Non renseigné";

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("PROTOCOLE DE SÉCURITÉ", 20, 25);
            doc.setFontSize(14);
            doc.text("Chargement / Déchargement", 20, 40);

            doc.setFontSize(12);
            doc.text(`Raison Sociale Transporteur : ${raison}`, 20, 55);
            doc.text(`Société de livraison : ${societe}`, 20, 65);
            doc.text(`Chauffeur : ${nom}`, 20, 75);
            doc.text(`Type d'opération : ${typeOp}`, 20, 85);
            doc.text(`Date : ${date}`, 20, 95);
            doc.text(`Matières transportées : ${matieres}`, 20, 105);

            const signatureData = canvas.toDataURL('image/png');
            doc.addImage(signatureData, 'PNG', 20, 125, 130, 50);
            doc.text("Signature du chauffeur", 20, 185);

            const filename = `Protocole_Securite_${raison.replace(/[^a-zA-Z0-9]/g, '_')}_${date}.pdf`;

            doc.save(filename);
            alert(`✅ Protocole généré avec succès !\n\nFichier : ${filename}`);
        }
</script>
</body>
</html>
